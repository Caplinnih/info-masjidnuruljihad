<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SIMAS - Sistem Informasi Manajemen Masjid</title>

    <meta name="theme-color" content="#8B5E3C">
    <meta name="description" content="SIMAS - Sistem Informasi Manajemen Masjid Nurul Jihad">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #8B5E3C;
            --secondary: #C69C6D;
            --cream: #F8F2E9;
            --cream-soft: #FFFDF9;
            --text: #3D2B1F;
            --text-muted: #8C7765;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow: 0 20px 40px rgba(139, 94, 60, 0.12);
            --blur: 24px;
            --bg-gradient: linear-gradient(135deg, #fdfaf6 0%, #f6ece0 50%, #f0dfcb 100%);
        }

        body.dark {
            --primary: #E5C39E;
            --secondary: #C69C6D;
            --text: #F5EFEB;
            --text-muted: #BFAEA0;
            --glass-bg: rgba(36, 28, 23, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            --bg-gradient: linear-gradient(135deg, #1A130E 0%, #261B14 50%, #120A06 100%);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            background: var(--bg-gradient);
            height: 100vh;
            width: 100vw;
            color: var(--text);
            transition: background 0.5s cubic-bezier(0.4, 0, 0.2, 1), color 0.3s ease;
        }

        /* BACKGROUND ELEMENTS */
        .bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            will-change: transform;
            animation: float 12s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .circle:nth-child(1) {
            width: 350px;
            height: 350px;
            background: rgba(198, 156, 109, 0.25);
            top: -120px;
            left: -120px;
        }

        .circle:nth-child(2) {
            width: 300px;
            height: 300px;
            background: rgba(139, 94, 60, 0.15);
            right: -100px;
            bottom: -100px;
            animation-delay: -3s;
        }

        .circle:nth-child(3) {
            width: 250px;
            height: 250px;
            background: rgba(215, 185, 141, 0.25);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: floatCenter 15s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }

        @keyframes floatCenter {
            0%, 100% { transform: translate(-50%, -50%) scale(1); }
            50% { transform: translate(-45%, -55%) scale(1.05); }
        }

        /* LOADING / SPLASH SCREEN */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            background: transparent;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
            will-change: opacity, visibility;
        }

        .loading-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 35px;
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            transition: background 0.4s ease, border 0.4s ease, box-shadow 0.4s ease;
        }

        .logo-box {
            width: 96px;
            height: 96px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255,255,255,0.6), rgba(255,255,255,0.1));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 46px;
            border: 1px solid rgba(255,255,255,0.4);
            box-shadow: inset 0 4px 10px rgba(255,255,255,0.2);
        }

        body.dark .logo-box {
            background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.1);
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(139, 94, 60, 0.1);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }

        body.dark .badge {
            background: rgba(229, 195, 158, 0.15);
        }

        .title {
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            margin-top: 4px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            letter-spacing: 0.3px;
        }

        .masjid {
            margin-top: 8px;
            font-size: 20px;
            font-weight: 700;
        }

        .arab {
            font-family: 'Scheherazade New', serif;
            font-size: 32px;
            margin-top: 12px;
            color: var(--secondary);
            line-height: 1.2;
        }

        .desc {
            margin-top: 16px;
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 13.5px;
        }

        /* PROGRESS BAR */
        .progress {
            margin-top: 24px;
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(0, 0, 0, 0.05);
            position: relative;
        }

        body.dark .progress {
            background: rgba(255, 255, 255, 0.1);
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8B5E3C, #C69C6D);
            border-radius: 999px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            will-change: width;
        }

        .status {
            margin-top: 12px;
            font-size: 12.5px;
            color: var(--primary);
            font-weight: 600;
        }

        /* BUTTONS */
        .bio-wrap {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 24px;
        }

        .bio-btn {
            border: none;
            cursor: pointer;
            padding: 10px 18px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
        }

        body.dark .bio-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .bio-btn:hover, .bio-btn:active {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        body.dark .bio-btn:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .dark-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            box-shadow: var(--shadow);
            transition: transform 0.2s ease, background 0.3s;
        }

        .dark-toggle:hover {
            transform: scale(1.05);
        }

        /* METADATA & FOOTER */
        .meta {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            font-size: 11.5px;
            color: var(--text-muted);
            border-top: 1px solid rgba(0,0,0,0.06);
            padding-top: 16px;
        }

        body.dark .meta {
            border-top-color: rgba(255,255,255,0.08);
        }

        .footer {
            margin-top: 16px;
            font-size: 11.5px;
            color: var(--text-muted);
        }

        .footer span {
            color: var(--primary);
            font-weight: 700;
        }

        /* MAIN APP CONTAINER (IFRAME VERCEL OPTIMIZED) */
        .app {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: #fff;
        }

        body.dark .app {
            background: #1A130E;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* RESPONSIVE DESIGN */
        @media(max-width: 768px) {
            .title { font-size: 34px; }
            .card { padding: 28px 24px; border-radius: 28px; }
            .logo-box { width: 84px; height: 84px; font-size: 40px; }
            .arab { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="bg">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <button class="dark-toggle" onclick="toggleDark()" id="darkToggleBtn" aria-label="Toggle Dark Mode">🌙</button>

    <div class="loading-screen" id="loading">
        <div class="card">
            <div class="logo-box">🕌</div>
            <div class="badge">MASJID NURUL JIHAD</div>
            <h1 class="title">SIMAS</h1>
            <div class="subtitle">Sistem Informasi Manajemen Masjid</div>
            <div class="masjid">Masjid Nurul Jihad</div>
            <div class="arab">وَأَنَّ الْمَسَاجِدَ لِلَّهِ</div>
            <div class="desc">
                Platform Digital Pengelolaan Masjid Modern,<br>Transparan, Aman dan Terintegrasi.
            </div>

            <div class="progress">
                <div class="bar" id="bar"></div>
            </div>
            <div class="status" id="status">Menghubungkan Server...</div>

            <div class="bio-wrap">
                <button class="bio-btn">👆 Fingerprint</button>
                <button class="bio-btn">😊 Face ID</button>
            </div>

            <div class="meta">
                <span>v3.0.0</span>
                <span>2026</span>
            </div>
            <div class="footer">
                Developed by <span>Fincode</span> © 2026
            </div>
        </div>
    </div>

    <div class="app">
        <iframe id="mainFrame" src="https://script.google.com/macros/s/AKfycbzttn13VxI6nLFnj6yfL4vyY-QIwmOtAwcjA3LXoSOYLQqgVY0GGhtopwvKLAd0nFywDA/exec"></iframe>
    </div>

    <script>
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');
        const mainFrame = document.getElementById('mainFrame');

        const steps = [
            { p: 15, t: 'Menghubungkan Server...' },
            { p: 35, t: 'Memuat Data Masjid...' },
            { p: 55, t: 'Memuat Data Jamaah...' },
            { p: 75, t: 'Sinkronisasi Sistem...' },
            { p: 90, t: 'Menyiapkan Antarmuka...' }
        ];

        let currentStep = 0;

        // Simulasi progress awal berjalan halus
        const progressInterval = setInterval(() => {
            if (currentStep < steps.length) {
                bar.style.width = steps[currentStep].p + '%';
                status.innerText = steps[currentStep].t;
                currentStep++;
            } else {
                clearInterval(progressInterval);
            }
        }, 600);

        // Trigger saat Iframe Google Apps Script SELESAI memuat penuh
        mainFrame.addEventListener('load', () => {
            clearInterval(progressInterval); // Hentikan simulasi jika load selesai lebih cepat
            bar.style.width = '100%';
            status.innerText = 'SIMAS Siap Digunakan';
            
            setTimeout(() => {
                loading.classList.add('hide');
            }, 500); // Transisi smooth menyembunyikan splash screen
        });

        // Fitur Dark Mode Toggle yang Halus
        function toggleDark() {
            const isDark = document.body.classList.toggle('dark');
            document.getElementById('darkToggleBtn').innerText = isDark ? '☀️' : '🌙';
        }
    </script>
</body>
</html>
