<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>SIMAS - Masjid Nurul Jihad</title>

<meta name="theme-color" content="#0F766E">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Sistem Informasi Manajemen Masjid Nurul Jihad">

<link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=1JjN2pncH1XM70Gc2ZOCMKTI3Nt3LqXoc&sz=w64">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after {
    margin: 0; padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

:root {
    --emerald:   #0F766E;
    --emerald-2: #0d9488;
    --gold:      #C9922A;
    --gold-lt:   #e8b84b;
}

html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Plus Jakarta Sans', sans-serif;
    -webkit-font-smoothing: antialiased;
}

/* ── BACKGROUND ── */
body {
    background:
        radial-gradient(ellipse 80% 60% at 15% 10%, rgba(15,118,110,.18) 0%, transparent 60%),
        radial-gradient(ellipse 70% 55% at 85% 90%, rgba(201,146,42,.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(13,148,136,.08) 0%, transparent 60%),
        linear-gradient(160deg, #e8f5f3 0%, #f0ece4 50%, #faf6ee 100%);
    position: relative;
}

/* floating orbs */
body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
}
body::before {
    width: 55vw; height: 55vw;
    max-width: 420px; max-height: 420px;
    background: radial-gradient(circle, rgba(15,118,110,.15) 0%, transparent 70%);
    top: -12vw; left: -8vw;
    animation: orb1 10s ease-in-out infinite;
}
body::after {
    width: 50vw; height: 50vw;
    max-width: 380px; max-height: 380px;
    background: radial-gradient(circle, rgba(201,146,42,.12) 0%, transparent 70%);
    bottom: -10vw; right: -8vw;
    animation: orb2 12s ease-in-out infinite;
}
@keyframes orb1 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
@keyframes orb2 { 0%,100%{transform:translateY(0)} 50%{transform:translateY(16px)} }

/* ── LOADING SCREEN ── */
.loading-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; justify-content: center; align-items: center;
    padding:
        max(20px, env(safe-area-inset-top, 20px))
        max(20px, env(safe-area-inset-right, 20px))
        max(20px, env(safe-area-inset-bottom, 20px))
        max(20px, env(safe-area-inset-left, 20px));
    transition: opacity .4s ease, visibility .4s ease;
}
.loading-screen.hide {
    opacity: 0; visibility: hidden; pointer-events: none;
}

/* ── CARD ── */
.card {
    position: relative; z-index: 1;
    width: 100%; max-width: 400px;
    padding: clamp(28px,6vw,44px) clamp(24px,6vw,40px);
    border-radius: clamp(20px,5vw,28px);
    background: rgba(255,255,255,.72);
    border: 1px solid rgba(255,255,255,.90);
    backdrop-filter: blur(32px) saturate(1.6);
    -webkit-backdrop-filter: blur(32px) saturate(1.6);
    box-shadow:
        0 8px 32px rgba(15,118,110,.10),
        0 2px 8px rgba(0,0,0,.06),
        inset 0 1px 0 rgba(255,255,255,.95);
    text-align: center;
    animation: cardIn .7s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn {
    from { opacity:0; transform:translateY(20px) scale(.98); }
    to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ── MOSQUE NAME BADGE ── */
.mosque-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--emerald), var(--emerald-2));
    color: #fff;
    font-size: clamp(9px,2.2vw,10.5px);
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 999px;
    margin-bottom: clamp(12px,3vw,16px);
    box-shadow: 0 2px 8px rgba(15,118,110,.25);
}
.mosque-badge::before {
    content: '🕌';
    font-size: 11px;
}

/* ── LOGO ── */
.logo-box {
    width: clamp(130px,42vw,190px);
    height: clamp(82px,26vw,118px);
    margin: 0 auto clamp(10px,2.5vw,14px);
    display: flex; align-items: center; justify-content: center;
}
.logo-box img {
    width: 100%; height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 3px 10px rgba(15,118,110,.18));
}

/* ── TEXTS ── */
.mosque-name {
    font-size: clamp(17px,4.5vw,22px);
    font-weight: 800;
    color: #0f3330;
    line-height: 1.2;
    letter-spacing: -.3px;
}
.tagline {
    margin-top: 4px;
    font-size: clamp(11px,2.8vw,13px);
    font-weight: 500;
    color: #4b7a75;
    line-height: 1.4;
}
.dev-tag {
    margin-top: 6px;
    font-size: clamp(9px,2.1vw,10px);
    font-weight: 600;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: .85;
}

/* ── DIVIDER ── */
.divider {
    width: 40px; height: 2px;
    margin: clamp(14px,3.5vw,20px) auto;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, rgba(15,118,110,.4), transparent);
}

/* ── SPINNER ── */
.loader-wrap {
    position: relative;
    width: clamp(34px,8.5vw,42px);
    height: clamp(34px,8.5vw,42px);
    margin: 0 auto clamp(14px,3.5vw,18px);
}
.ring-outer {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 2.5px solid rgba(15,118,110,.12);
    border-top-color: var(--emerald);
    animation: spin .8s linear infinite;
}
.ring-inner {
    position: absolute; inset: 6px;
    border-radius: 50%;
    border: 2px solid rgba(201,146,42,.12);
    border-bottom-color: var(--gold);
    animation: spin .6s linear infinite reverse;
}
.dot {
    position: absolute; top:50%; left:50%;
    transform: translate(-50%,-50%);
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--emerald);
    animation: pulse 1.2s ease-in-out infinite;
}
@keyframes spin  { to { transform: rotate(360deg); } }
@keyframes pulse {
    0%,100% { opacity:.4; transform:translate(-50%,-50%) scale(.7); }
    50%      { opacity:1;  transform:translate(-50%,-50%) scale(1.1); }
}

/* ── PROGRESS ── */
.progress-wrap {
    height: 5px;
    background: rgba(15,118,110,.10);
    border-radius: 999px;
    overflow: hidden;
}
.bar {
    height: 100%; width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--emerald), var(--gold-lt));
    transition: width .45s cubic-bezier(.4,0,.2,1);
    position: relative;
}
.bar::after {
    content: '';
    position: absolute; top:0; right:0; bottom:0; width:24px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.5));
}

/* ── STATUS ── */
.status-wrap {
    margin-top: 8px;
    display: flex; justify-content: space-between; align-items: center; gap:8px;
}
.status {
    font-size: clamp(11px,2.6vw,12px);
    color: #5a8a84;
    font-weight: 500;
    text-align: left;
    transition: opacity .2s ease;
}
.status.fade { opacity: 0; }
#percent {
    font-size: clamp(11px,2.6vw,12px);
    color: var(--gold);
    font-weight: 700;
    white-space: nowrap;
}

/* ── FOOTER ── */
.footer {
    margin-top: clamp(18px,4.5vw,26px);
    padding-top: clamp(12px,3vw,16px);
    border-top: 1px solid rgba(15,118,110,.12);
    display: flex; align-items: center; justify-content: center; gap: 9px;
}
.fc-badge {
    flex-shrink: 0;
    width: 28px; height: 28px;
    border-radius: 7px;
    background: linear-gradient(135deg, var(--emerald) 0%, #0a5750 100%);
    border: 1px solid rgba(255,255,255,.3);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(15,118,110,.25);
    position: relative; overflow: hidden;
}
.fc-badge::after {
    content: '';
    position: absolute; top:0; left:0; right:0; height:50%;
    background: rgba(255,255,255,.12);
}
.fc-text {
    position: relative; z-index: 1;
    font-size: 10.5px; font-weight: 800;
    color: var(--gold-lt);
    letter-spacing: -.3px; line-height: 1;
}
.footer-info { text-align: left; }
.footer-brand {
    font-size: clamp(9.5px,2.3vw,11px);
    color: #1e4a46;
    font-weight: 700;
    letter-spacing: .5px;
}
.footer-tagline {
    font-size: clamp(8.5px,2vw,10px);
    color: #6b9e99;
    margin-top: 1px;
    letter-spacing: .2px;
}

/* ── APP FRAME ── */
.app {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    background: #fff; z-index: 1;
}
iframe {
    width: 100%; height: 100%;
    border: none; display: block;
}

/* ── LANDSCAPE SHORT ── */
@media (max-height: 480px) and (orientation: landscape) {
    .card { padding: 16px 24px; border-radius: 16px; }
    .logo-box { width: 90px; height: 56px; margin-bottom: 6px; }
    .mosque-badge { margin-bottom: 8px; }
    .divider { margin: 8px auto; }
    .loader-wrap { width: 30px; height: 30px; margin-bottom: 10px; }
}
</style>
</head>
<body>

<div class="loading-screen" id="loading">
    <div class="card">

        <div class="mosque-badge">Nurul Jihad</div>

        <div class="logo-box">
            <img src="https://drive.google.com/thumbnail?id=1JjN2pncH1XM70Gc2ZOCMKTI3Nt3LqXoc&sz=w500" alt="SIMAS Logo">
        </div>

        <div class="mosque-name">Masjid Nurul Jihad</div>
        <div class="tagline">Sistem Informasi Manajemen Masjid</div>
        <div class="dev-tag">Powered by Fincode Studio</div>

        <div class="divider"></div>

        <div class="loader-wrap">
            <div class="ring-outer"></div>
            <div class="ring-inner"></div>
            <div class="dot"></div>
        </div>

        <div class="progress-wrap">
            <div class="bar" id="bar"></div>
        </div>

        <div class="status-wrap">
            <div class="status" id="status">Menginisialisasi sistem...</div>
            <div id="percent">0%</div>
        </div>

        <div class="footer">
            <div class="fc-badge"><span class="fc-text">FC</span></div>
            <div class="footer-info">
                <div class="footer-brand">FINCODE STUDIO</div>
                <div class="footer-tagline">Crafting Smart Digital Solutions</div>
            </div>
        </div>

    </div>
</div>

<div class="app">
    <iframe id="mainFrame"
        src="https://script.google.com/macros/s/AKfycbzfNXxG6wTIu2XFuCouvIARRi5VKThDTNEZQjFYZgjDtpPEYKnV5BvqvzXBV1Rhtacfaw/exec">
    </iframe>
</div>

<script>
const bar     = document.getElementById('bar');
const status  = document.getElementById('status');
const percent = document.getElementById('percent');
const loading = document.getElementById('loading');
const frame   = document.getElementById('mainFrame');

const steps = [
    { p:20, t:'Menghubungkan ke server...' },
    { p:40, t:'Memverifikasi keamanan...' },
    { p:60, t:'Sinkronisasi data masjid...' },
    { p:80, t:'Menyiapkan dashboard...' },
    { p:92, t:'Hampir selesai...' }
];

let idx = 0;

function setStep(p, t) {
    bar.style.width   = p + '%';
    percent.innerText = p + '%';
    status.classList.add('fade');
    setTimeout(() => {
        status.innerText = t;
        status.classList.remove('fade');
    }, 180);
}

const iv = setInterval(() => {
    if (idx < steps.length) { setStep(steps[idx].p, steps[idx].t); idx++; }
}, 650);

function done() {
    clearInterval(iv);
    setStep(100, 'Aplikasi berhasil dimuat ✓');
    setTimeout(() => loading.classList.add('hide'), 400);
}

frame.addEventListener('load', done);

setTimeout(() => {
    if (!loading.classList.contains('hide')) {
        setStep(100, 'Koneksi lambat, melanjutkan...');
        setTimeout(() => loading.classList.add('hide'), 400);
    }
}, 11000);
</script>
</body>
</html>
