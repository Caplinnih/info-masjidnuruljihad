<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SIMAS - Masjid Nurul Jihad</title>
<meta name="theme-color" content="#07110f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=1JjN2pncH1XM70Gc2ZOCMKTI3Nt3LqXoc&sz=w64">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}

html,body{width:100%;height:100%;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;-webkit-font-smoothing:antialiased}

body{
  background:
    radial-gradient(ellipse 70% 50% at 18% 0%, rgba(15,118,110,.38) 0%, transparent 55%),
    radial-gradient(ellipse 60% 45% at 82% 100%, rgba(212,175,55,.13) 0%, transparent 55%),
    radial-gradient(ellipse 45% 40% at 50% 52%, rgba(20,184,166,.07) 0%, transparent 60%),
    #07110f;
}

/* floating orbs */
body::before,body::after{content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0}
body::before{
  width:55vw;height:55vw;max-width:400px;max-height:400px;
  background:radial-gradient(circle,rgba(15,118,110,.22) 0%,transparent 70%);
  top:-12vw;left:-8vw;
  animation:orb1 9s ease-in-out infinite;
}
body::after{
  width:50vw;height:50vw;max-width:360px;max-height:360px;
  background:radial-gradient(circle,rgba(212,175,55,.10) 0%,transparent 70%);
  bottom:-10vw;right:-8vw;
  animation:orb2 11s ease-in-out infinite;
}
@keyframes orb1{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes orb2{0%,100%{transform:translateY(0)}50%{transform:translateY(15px)}}

/* ── LOADING SCREEN — z-index paling tinggi ── */
.loading-screen{
  position:fixed;inset:0;
  z-index:9999;               /* jauh di atas iframe */
  background:
    radial-gradient(ellipse 70% 50% at 18% 0%, rgba(15,118,110,.38) 0%, transparent 55%),
    radial-gradient(ellipse 60% 45% at 82% 100%, rgba(212,175,55,.13) 0%, transparent 55%),
    #07110f;
  display:flex;justify-content:center;align-items:center;
  padding:
    max(20px,env(safe-area-inset-top,20px))
    max(20px,env(safe-area-inset-right,20px))
    max(20px,env(safe-area-inset-bottom,20px))
    max(20px,env(safe-area-inset-left,20px));
  transition:opacity .35s ease,visibility .35s ease;
}
.loading-screen.hide{opacity:0;visibility:hidden;pointer-events:none}

/* card */
.card{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  padding:clamp(28px,6vw,46px) clamp(24px,6vw,40px);
  border-radius:clamp(20px,5vw,28px);
  background:linear-gradient(160deg,rgba(255,255,255,.09) 0%,rgba(255,255,255,.03) 100%);
  border:1px solid rgba(255,255,255,.10);
  backdrop-filter:blur(30px);
  -webkit-backdrop-filter:blur(30px);
  box-shadow:
    0 32px 64px rgba(0,0,0,.50),
    0 8px 20px rgba(0,0,0,.30),
    inset 0 1px 0 rgba(255,255,255,.11);
  text-align:center;
  animation:cardIn .55s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(16px) scale(.97)}
  to  {opacity:1;transform:translateY(0) scale(1)}
}

/* mosque badge */
.mosque-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(15,118,110,.28);
  border:1px solid rgba(20,184,166,.22);
  color:#5eead4;
  font-size:clamp(9px,2.2vw,10px);
  font-weight:700;letter-spacing:1.8px;text-transform:uppercase;
  padding:4px 12px;border-radius:999px;
  margin-bottom:clamp(12px,3vw,16px);
}
.mosque-badge::before{content:'🕌';font-size:10px}

/* logo */
.logo-box{
  width:clamp(130px,42vw,190px);
  height:clamp(82px,26vw,118px);
  margin:0 auto clamp(10px,2.5vw,14px);
  display:flex;align-items:center;justify-content:center;
}
.logo-box img{
  width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 4px 14px rgba(212,175,55,.22));
}

/* texts */
.mosque-name{
  font-size:clamp(16px,4.2vw,21px);
  font-weight:800;color:#f1f5f9;
  line-height:1.25;letter-spacing:-.3px;
}
.tagline{
  margin-top:4px;
  font-size:clamp(13px,3.5vw,16px);
  font-weight:700;color:#f1f5f9;line-height:1.3;
  white-space:nowrap;
}
.dev-tag{
  margin-top:6px;
  font-size:clamp(9px,2.1vw,10px);
  font-weight:700;color:#C9922A;
  text-transform:uppercase;letter-spacing:2px;opacity:.85;
}

/* divider */
.divider{
  width:40px;height:2px;
  margin:clamp(14px,3.5vw,20px) auto;
  border-radius:999px;
  background:linear-gradient(90deg,transparent,rgba(212,175,55,.45),transparent);
}

/* spinner */
.loader-wrap{
  position:relative;
  width:clamp(34px,8.5vw,42px);height:clamp(34px,8.5vw,42px);
  margin:0 auto clamp(14px,3.5vw,18px);
}
.ring-outer{
  position:absolute;inset:0;border-radius:50%;
  border:2px solid rgba(255,255,255,.07);
  border-top-color:rgba(212,175,55,.80);
  animation:spin .75s linear infinite;
}
.ring-inner{
  position:absolute;inset:6px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.05);
  border-bottom-color:rgba(20,184,166,.75);
  animation:spin .55s linear infinite reverse;
}
.dot{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:5px;height:5px;border-radius:50%;
  background:#D4AF37;
  box-shadow:0 0 7px rgba(212,175,55,.65);
  animation:pulse 1.1s ease-in-out infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{
  0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(.7)}
  50%    {opacity:1; transform:translate(-50%,-50%) scale(1.1)}
}

/* progress */
.progress-wrap{
  height:5px;
  background:rgba(255,255,255,.08);
  border-radius:999px;overflow:hidden;
}
.bar{
  height:100%;width:0%;border-radius:999px;
  background:linear-gradient(90deg,#0F766E,#D4AF37);
  transition:width .35s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.bar::after{
  content:'';
  position:absolute;top:0;right:0;bottom:0;width:24px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28));
}

/* status */
.status-wrap{
  margin-top:8px;
  display:flex;justify-content:space-between;align-items:center;gap:8px;
}
.status{
  font-size:clamp(11px,2.6vw,12px);
  color:#64748b;font-weight:500;text-align:left;
  transition:opacity .15s ease;
}
.status.fade{opacity:0}
#percent{
  font-size:clamp(11px,2.6vw,12px);
  color:#D4AF37;font-weight:700;white-space:nowrap;
}

/* footer */
.footer{
  margin-top:clamp(18px,4.5vw,24px);
  padding-top:clamp(12px,3vw,16px);
  border-top:1px solid rgba(255,255,255,.07);
  display:flex;align-items:center;justify-content:center;gap:9px;
}
.fc-badge{
  flex-shrink:0;width:28px;height:28px;border-radius:7px;
  background:linear-gradient(135deg,#0F766E 0%,#0a5750 100%);
  border:1px solid rgba(255,255,255,.12);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,.35);
  position:relative;overflow:hidden;
}
.fc-badge::after{
  content:'';position:absolute;top:0;left:0;right:0;height:50%;
  background:rgba(255,255,255,.10);
}
.fc-text{
  position:relative;z-index:1;
  font-size:10.5px;font-weight:800;
  color:#e8b84b;letter-spacing:-.3px;line-height:1;
}
.footer-info{text-align:left}
.footer-brand{
  font-size:clamp(9.5px,2.3vw,11px);
  color:#cbd5e1;font-weight:700;letter-spacing:.5px;
}
.footer-tagline{
  font-size:clamp(8.5px,2vw,10px);
  color:#475569;margin-top:1px;letter-spacing:.2px;
}

/* ── APP FRAME — tersembunyi dulu ── */
.app{
  position:fixed;inset:0;
  width:100%;height:100%;
  background:#07110f;
  z-index:1;
  opacity:0;                  /* mulai transparan */
  transition:opacity .4s ease;
}
.app.show{opacity:1}

iframe{width:100%;height:100%;border:none;display:block}

/* landscape short */
@media(max-height:480px) and (orientation:landscape){
  .card{padding:14px 22px;border-radius:14px}
  .logo-box{width:80px;height:50px;margin-bottom:6px}
  .mosque-badge{margin-bottom:6px}
  .divider{margin:8px auto}
  .loader-wrap{width:28px;height:28px;margin-bottom:10px}
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loading">
  <div class="card">
    <div class="logo-box">
      <img src="https://drive.google.com/thumbnail?id=1JjN2pncH1XM70Gc2ZOCMKTI3Nt3LqXoc&sz=w500" alt="SIMAS Logo">
    </div>
    <div class="tagline">Sistem Informasi Manajemen Masjid</div>
    <div class="dev-tag">Developed by Fincode Studio</div>
    <div class="divider"></div>
    <div class="loader-wrap">
      <div class="ring-outer"></div>
      <div class="ring-inner"></div>
      <div class="dot"></div>
    </div>
    <div class="progress-wrap">
      <div class="bar" id="bar"></div>
    </div>
    <div class="status-wrap">
      <div class="status" id="status">Menginisialisasi sistem...</div>
      <div id="percent">0%</div>
    </div>
    <div class="footer">
      <div class="fc-badge"><span class="fc-text">FC</span></div>
      <div class="footer-info">
        <div class="footer-brand">FINCODE STUDIO</div>
        <div class="footer-tagline">Crafting Smart Digital Solutions</div>
      </div>
    </div>
  </div>
</div>

<!-- App (hidden until loaded) -->
<div class="app" id="app">
  <iframe id="mainFrame"
    src="https://script.google.com/macros/s/AKfycbziP1uZwtfZWsbZqU9OcObdXsB68dRvRQ3IV_4kUg2X1ErHN2oqhNdgeUaZb8eWcqCybw/exec">
  </iframe>
</div>

<script>
const bar     = document.getElementById('bar');
const status  = document.getElementById('status');
const percent = document.getElementById('percent');
const loading = document.getElementById('loading');
const app     = document.getElementById('app');
const frame   = document.getElementById('mainFrame');

const steps=[
  {p:20,t:'Menghubungkan ke server...'},
  {p:42,t:'Memverifikasi keamanan...'},
  {p:63,t:'Sinkronisasi data masjid...'},
  {p:82,t:'Menyiapkan dashboard...'},
  {p:93,t:'Hampir selesai...'}
];
let idx=0;

function setStep(p,t){
  bar.style.width=p+'%';
  percent.innerText=p+'%';
  status.classList.add('fade');
  setTimeout(()=>{status.innerText=t;status.classList.remove('fade');},150);
}

const iv=setInterval(()=>{
  if(idx<steps.length){setStep(steps[idx].p,steps[idx].t);idx++;}
},500);

function done(){
  clearInterval(iv);
  setStep(100,'Aplikasi berhasil dimuat');
  setTimeout(()=>{
    loading.classList.add('hide');   /* sembunyikan loading */
    app.classList.add('show');       /* tampilkan app */
  },350);
}

frame.addEventListener('load', done);

setTimeout(()=>{
  if(!loading.classList.contains('hide')){
    setStep(100,'Melanjutkan...');
    setTimeout(()=>{
      loading.classList.add('hide');
      app.classList.add('show');
    },300);
  }
},10000);
  
</script>
</body>
</html>
