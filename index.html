<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fincode Studio - Loading Application</title>

    <meta name="theme-color" content="#040d1a">
    <meta name="description" content="Fincode Studio - Digital Solutions">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-dark: #020813;
            --card-bg: rgba(4, 13, 26, 0.65);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary-blue: #0070f3;
            --text-light: #f3f4f6;
            --text-muted: #64748b;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            background-color: var(--bg-dark);
            height: 100vh;
            width: 100vw;
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* BACKGROUND GRADIENT GLOW */
        .bg-glow {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .glow-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 112, 243, 0.15) 0%, rgba(0,0,0,0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: blur(40px);
        }

        /* SPLASH SCREEN */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-color: var(--bg-dark);
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.6s;
            will-change: opacity, visibility;
        }

        .loading-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        /* LOGO & TAGLINE CONTAINER */
        .brand-header {
            margin: 0 auto 30px auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* Memotong & memunculkan seluruh blok logo + tagline dari 1% ke 100% */
            clip-path: circle(1% at 50% 50%);
            animation: brandReveal 2.2s cubic-bezier(0.76, 0, 0.24, 1) forwards;
        }

        .logo-box {
            width: 180px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: containment;
        }

        /* STYLE UNTUK TAGLINE BARU */
        .tagline {
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.75);
            letter-spacing: 0.5px;
            word-spacing: 1px;
        }

        .tagline span.highlight {
            color: #00dfd8; /* Efek biru neon menyala untuk kata "Smart" */
            font-weight: 700;
        }

        @keyframes brandReveal {
            0% {
                clip-path: circle(1% at 50% 50%);
                transform: scale(0.92);
                filter: brightness(0.3) blur(2px);
            }
            100% {
                clip-path: circle(100% at 50% 50%);
                transform: scale(1);
                filter: brightness(1) blur(0);
            }
        }

        /* PROGRESS BAR MINIMALIS */
        .progress {
            margin-top: 10px;
            height: 6px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0070f3, #00dfd8);
            border-radius: 999px;
            transition: width 0.3s ease-out;
            will-change: width;
        }

        .status {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* FOOTER BRANDING */
        .footer {
            margin-top: 35px;
            font-size: 12px;
            color: var(--text-muted);
            border-top: 1px solid rgba(255,255,255,0.04);
            padding-top: 20px;
        }

        .brand-animated {
            font-weight: 700;
            color: var(--text-light);
            letter-spacing: 0.5px;
        }

        /* LAYOUT UTAMA (IFRAME APLIKASI) */
        .app {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: #ffffff;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        @media(max-width: 480px) {
            .card { padding: 35px 20px; border-radius: 24px; }
            .logo-box { width: 150px; height: 100px; }
            .tagline { font-size: 11.5px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow">
        <div class="glow-circle"></div>
    </div>

    <!-- LOADING SCREEN FOKUS BRAND LOGO + TAGLINE -->
    <div class="loading-screen" id="loading">
        <div class="card">
            
            <!-- CONTAINER LOGO DAN TAGLINE BERANIMASI -->
            <div class="brand-header">
                <div class="logo-box">
                    <img src="logo.png" alt="Fincode Studio Logo">
                </div>
                <!-- Tagline Tambahan -->
                <div class="tagline">Crafting <span class="highlight">Smart</span> Digital Solutions</div>
            </div>

            <div class="progress">
                <div class="bar" id="bar"></div>
            </div>
            <div class="status" id="status">Menginisialisasi sistem...</div>

            <div class="footer">
                <span class="brand-animated">FINCODE STUDIO</span> © 2026
            </div>
        </div>
    </div>

    <!-- FRAME UTAMA YANG DITUJU -->
    <div class="app">
        <iframe id="mainFrame" src="https://script.google.com/macros/s/AKfycbzfNXxG6wTIu2XFuCouvIARRi5VKThDTNEZQjFYZgjDtpPEYKnV5BvqvzXBV1Rhtacfaw/exec"></iframe>
    </div>

    <script>
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');
        const mainFrame = document.getElementById('mainFrame');

        const steps = [
            { p: 15, t: 'Menghubungkan ke server...' },
            { p: 40, t: 'Mengamankan koneksi...' },
            { p: 65, t: 'Sinkronisasi komponen...' },
            { p: 85, t: 'Memuat antarmuka...' },
            { p: 95, t: 'Menyiapkan ruang kerja...' }
        ];

        let currentStep = 0;

        const progressInterval = setInterval(() => {
            if (currentStep < steps.length) {
                bar.style.width = steps[currentStep].p + '%';
                status.innerText = steps[currentStep].t;
                currentStep++;
            } else {
                clearInterval(progressInterval);
            }
        }, 400);

        mainFrame.addEventListener('load', () => {
            clearInterval(progressInterval);
            bar.style.width = '100%';
            status.innerText = 'Selesai';
            
            setTimeout(() => {
                loading.classList.add('hide');
            }, 500); 
        });
    </script>
</body>
</html>
