<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SIMAS - Sistem Informasi Manajemen Masjid</title>

    <meta name="theme-color" content="#8B5E3C">
    <meta name="description" content="SIMAS - Sistem Informasi Manajemen Masjid Nurul Jihad">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #8B5E3C;
            --secondary: #C69C6D;
            --cream: #F8F2E9;
            --cream-soft: #FFFDF9;
            --text: #3D2B1F;
            --text-muted: #8C7765;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --shadow: 0 20px 40px rgba(139, 94, 60, 0.12);
            --blur: 20px;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #fdfaf6 0%, #f6ece0 50%, #f0dfcb 100%);
            height: 100vh;
            width: 100vw;
            color: var(--text);
        }

        /* BACKGROUND BLUR ELEMENTS */
        .bg {
            position: fixed;
            inset: 0;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            will-change: transform;
            animation: float 12s ease-in-out infinite;
        }

        .circle:nth-child(1) {
            width: 350px;
            height: 350px;
            background: rgba(198, 156, 109, 0.25);
            top: -120px;
            left: -120px;
        }

        .circle:nth-child(2) {
            width: 300px;
            height: 300px;
            background: rgba(139, 94, 60, 0.15);
            right: -100px;
            bottom: -100px;
        }

        .circle:nth-child(3) {
            width: 220px;
            height: 220px;
            background: rgba(215, 185, 141, 0.3);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* SPLASH SCREEN */
        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.5s ease-out, visibility 0.5s;
            will-change: opacity, visibility;
        }

        .loading-screen.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--blur));
            -webkit-backdrop-filter: blur(var(--blur));
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 35px;
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .logo-box {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(255,255,255,0.7), rgba(255,255,255,0.2));
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 46px;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 50px;
            background: rgba(139, 94, 60, 0.1);
            color: var(--primary);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }

        .title {
            font-size: 40px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            margin-top: 4px;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
        }

        .masjid {
            margin-top: 8px;
            font-size: 20px;
            font-weight: 700;
        }

        .arab {
            font-family: 'Scheherazade New', serif;
            font-size: 32px;
            margin-top: 12px;
            color: var(--secondary);
            line-height: 1.2;
        }

        .desc {
            margin-top: 16px;
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 13.5px;
        }

        /* PROGRESS BAR */
        .progress {
            margin-top: 24px;
            height: 8px;
            border-radius: 999px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.5);
        }

        .bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #8B5E3C, #C69C6D);
            border-radius: 999px;
            transition: width 0.3s ease-out;
            will-change: width;
        }

        .status {
            margin-top: 12px;
            font-size: 12.5px;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px; /* Ditambahkan agar jarak seimbang setelah tombol bio dihapus */
        }

        /* METADATA & FOOTER */
        .meta {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            font-size: 11.5px;
            color: var(--text-muted);
            border-top: 1px solid rgba(0,0,0,0.06);
            padding-top: 16px;
        }

        .footer {
            margin-top: 16px;
            font-size: 11.5px;
            color: var(--text-muted);
        }

        /* ANIMASI MODERN FINCODE BERGERAK (MATE / LUXURY GLOW) */
        .footer .brand-animated {
            font-weight: 800;
            letter-spacing: 0.5px;
            display: inline-block;
            background: linear-gradient(
                120deg, 
                #8B5E3C 0%, 
                #C69C6D 30%, 
                #f59e0b 50%, 
                #C69C6D 70%, 
                #8B5E3C 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineGradient 4s linear infinite;
        }

        @keyframes shineGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* AMAN UNTUK SEMUA LAYAR: DESKTOP, ANDROID, IPHONE */
        .app {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            background: #ffffff;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        @media(max-width: 768px) {
            .title { font-size: 34px; }
            .card { padding: 28px 20px; border-radius: 28px; }
            .logo-box { width: 84px; height: 84px; font-size: 40px; }
        }
    </style>
</head>
<body>

    <div class="bg">
        <div class="circle"></div>
        <div class="circle"></div>
        <div class="circle"></div>
    </div>

    <div class="loading-screen" id="loading">
        <div class="card">
            <div class="logo-box">🕌</div>
            <div class="badge">MASJID NURUL JIHAD</div>
            <h1 class="title">SIMAS</h1>
            <div class="subtitle">Sistem Informasi Manajemen Masjid</div>
            <div class="masjid">Masjid Nurul Jihad</div>
            <div class="arab">وَأَنَّ الْمَسَاجِدَ لِلَّهِ</div>
            <div class="desc">
                Platform Digital Pengelolaan Masjid Modern,<br>Transparan, Aman dan Terintegrasi.
            </div>

            <div class="progress">
                <div class="bar" id="bar"></div>
            </div>
            <div class="status" id="status">Menghubungkan Server...</div>

            <div class="meta">
                <span>v3.0.0</span>
                <span>2026</span>
            </div>
            <div class="footer">
                Developed by <span class="brand-animated">Fincode</span> © 2026
            </div>
        </div>
    </div>

    <div class="app">
        <iframe id="mainFrame" src="https://script.google.com/macros/s/AKfycbx7eF2Hq_nvtjSYWu9btw2GwNsid49QMUcOEJ1bXWR4T2_OJNBgwy8Nqo3y2TwOy8whxA/exec"></iframe>
    </div>

    <script>
        const bar = document.getElementById('bar');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');
        const mainFrame = document.getElementById('mainFrame');

        const steps = [
            { p: 20, t: 'Menghubungkan Server...' },
            { p: 45, t: 'Memuat Data Masjid...' },
            { p: 65, t: 'Memuat Data Jamaah...' },
            { p: 85, t: 'Sinkronisasi Sistem...' },
            { p: 95, t: 'Menyiapkan Aplikasi...' }
        ];

        let currentStep = 0;

        const progressInterval = setInterval(() => {
            if (currentStep < steps.length) {
                bar.style.width = steps[currentStep].p + '%';
                status.innerText = steps[currentStep].t;
                currentStep++;
            } else {
                clearInterval(progressInterval);
            }
        }, 500);

        // Terpicu otomatis dan presisi ketika Web Google Apps Script selesai dimuat sepenuhnya
        mainFrame.addEventListener('load', () => {
            clearInterval(progressInterval);
            bar.style.width = '100%';
            status.innerText = 'SIMAS Siap Digunakan';
            
            setTimeout(() => {
                loading.classList.add('hide');
            }, 400); 
        });
    </script>
</body>
</html>
